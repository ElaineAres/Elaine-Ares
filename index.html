<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="keywords" content="website development, seo, hosting, web design, landing page, modern website, responsive website, svetainiu kurimas, seo paslaugos, hosting">

  <meta property="og:description" content="Modern websites, SEO support and hosting plans for businesses and private clients.">
  <meta property="og:url" content="https://elaineares.com/">
  <meta property="og:image" content="./images/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Elaine Ares | Modern Websites, SEO And Hosting">
  <meta name="twitter:description" content="Website creation, SEO and hosting services in Lithuanian, English and Russian.">
  <meta name="twitter:image" content="./images/logo.png">
  <link rel="icon" type="image/png" href="./images/logo.png">
  <style>
    :root {
      --bg: #08090d;
      --bg-soft: rgba(9, 10, 14, 0.76);
      --panel: rgba(19, 21, 29, 0.78);
      --panel-strong: rgba(14, 16, 22, 0.92);
      --line: rgba(255, 255, 255, 0.1);
      --line-soft: rgba(255, 255, 255, 0.06);
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.72);
      --muted-soft: rgba(245, 247, 251, 0.58);
      --accent: #74b3ff;
      --accent-2: #9bd6ff;
      --accent-warm: #d9e8ff;
      --success: #8ff0c8;
      --danger: #ffc29d;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      --radius: 24px;
      --radius-sm: 18px;
      --container: min(1180px, calc(100% - 32px));
      --nav-h: 84px;
      --ease: 260ms cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background: var(--bg);
      font-family: "Inter", "Segoe UI", sans-serif;
      isolation: isolate;
    }

    body.menu-open,
    body.chat-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .bg-video,
    .bg-overlay,
    .bg-noise,
    .bg-light {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.34) saturate(0.75) contrast(1.02);
      transform: scale(1.04);
    }

    .bg-overlay {
      z-index: 1;
      background:
        radial-gradient(circle at 15% 16%, rgba(116, 179, 255, 0.15), transparent 22%),
        radial-gradient(circle at 84% 18%, rgba(155, 214, 255, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(8, 9, 13, 0.42) 0%, rgba(8, 9, 13, 0.68) 45%, rgba(8, 9, 13, 0.94) 100%);
    }

    .bg-light {
      z-index: 2;
      filter: blur(70px);
      opacity: 0.48;
      background:
        radial-gradient(circle at 18% 28%, rgba(116, 179, 255, 0.16), transparent 20%),
        radial-gradient(circle at 78% 22%, rgba(155, 214, 255, 0.12), transparent 18%);
      animation: drift 18s ease-in-out infinite;
    }

    .bg-noise {
      z-index: 3;
      opacity: 0.05;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 4px 4px;
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1400;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 20px rgba(116, 179, 255, 0.8);
    }

    .glass,
    .card,
    .hero-panel,
    .stat-card,
    .pricing-card,
    .compare-wrap,
    .contact-panel,
    .chat-widget {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),
        var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .glass::before,
    .card::before,
    .hero-panel::before,
    .stat-card::before,
    .pricing-card::before,
    .compare-wrap::before,
    .contact-panel::before,
    .chat-widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0) 38%);
      opacity: 0.36;
      pointer-events: none;
    }

    .header {
      position: fixed;
      top: 16px;
      left: 0;
      width: 100%;
      z-index: 1300;
      transition: transform var(--ease);
    }

    .header-shell {
      width: var(--container);
      margin: 0 auto;
      border: 1px solid var(--line-soft);
      border-radius: 26px;
      background: rgba(11, 12, 17, 0.6);
      backdrop-filter: blur(16px);
      transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
    }

    .header.scrolled .header-shell {
      background: rgba(12, 14, 19, 0.84);
      border-color: var(--line);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.24);
    }

    .header-inner,
    .section-inner,
    .footer-inner {
      width: var(--container);
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: var(--nav-h);
      padding: 0 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo-wrap {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      flex: 0 0 auto;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      display: block;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.12rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      display: block;
      margin-top: 3px;
      color: var(--muted-soft);
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-left: auto;
    }

    .nav-link {
      position: relative;
      color: rgba(245, 247, 251, 0.84);
      font-size: 0.94rem;
    }

    .nav-link::after,
    .btn-primary::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--ease);
    }

    .nav-link:hover::after,
    .btn-primary:hover::after {
      transform: scaleX(1);
    }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 18px;
    }

    .lang {
      position: relative;
    }

    .lang-trigger,
    .btn-primary,
    .btn-secondary,
    .contact-pill,
    .chat-toggle,
    .menu-toggle,
    .quick-reply,
    .lang-option {
      transition:
        transform var(--ease),
        background var(--ease),
        border-color var(--ease),
        box-shadow var(--ease),
        opacity var(--ease);
    }

    .lang-trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 110px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
    }

    .lang-trigger::after {
      content: "▾";
      font-size: 0.84rem;
      color: var(--muted);
    }

    .lang-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 180px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(14, 16, 22, 0.96);
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity var(--ease), visibility var(--ease), transform var(--ease);
    }

    .lang.open .lang-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-option {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 247, 251, 0.86);
      text-align: left;
      cursor: pointer;
    }

    .lang-option.active,
    .lang-option:hover {
      border-color: var(--line);
      background: rgba(116, 179, 255, 0.12);
      color: #fff;
    }

    .btn-primary,
    .chat-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border: 0;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        linear-gradient(135deg, rgba(116, 179, 255, 0.9), rgba(155, 214, 255, 0.92));
      color: #08111d;
      font-weight: 600;
      box-shadow: 0 18px 40px rgba(80, 137, 214, 0.24);
      cursor: pointer;
    }

    .btn-secondary,
    .contact-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
    }

    .btn-primary:hover,
    .btn-secondary:hover,
    .contact-pill:hover,
    .chat-toggle:hover,
    .menu-toggle:hover,
    .quick-reply:hover,
    .lang-trigger:hover {
      transform: translateY(-2px);
    }

    .menu-toggle {
      display: none;
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      cursor: pointer;
    }

    .menu-toggle span,
    .menu-toggle::before,
    .menu-toggle::after {
      content: "";
      display: block;
      width: 18px;
      height: 2px;
      margin: 0 auto;
      border-radius: 999px;
      background: #fff;
      transition: transform var(--ease), opacity var(--ease);
    }

    .menu-toggle span {
      margin: 6px auto;
    }

    .menu-toggle.active::before {
      transform: translateY(8px) rotate(45deg);
    }

    .menu-toggle.active span {
      opacity: 0;
    }

    .menu-toggle.active::after {
      transform: translateY(-8px) rotate(-45deg);
    }

    .mobile-menu {
      position: fixed;
      top: 106px;
      left: 16px;
      right: 16px;
      z-index: 1290;
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(14, 16, 22, 0.96);
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-12px);
      transition: opacity var(--ease), visibility var(--ease), transform var(--ease);
    }

    .mobile-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    main {
      position: relative;
      z-index: 5;
      padding-top: 128px;
    }

    .section {
      position: relative;
      padding: 110px 0;
    }

    .section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(1120px, calc(100% - 32px));
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
      opacity: 0.55;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-warm);
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(116, 179, 255, 0.8);
    }

    .section-title,
    .hero-title,
    .pricing-title {
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 0.98;
      letter-spacing: 0.02em;
    }

    .section-title {
      margin-top: 18px;
      font-size: clamp(2.3rem, 5vw, 4.5rem);
    }

    .section-copy,
    .hero-copy,
    .helper-text,
    .comparison-note {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.82;
      font-size: 1.02rem;
    }

    .hero-grid,
    .hosting-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(340px, 0.98fr);
      gap: 28px;
      align-items: center;
    }

    .hero {
      padding-top: 54px;
      padding-bottom: 92px;
    }

    .hero-title {
      margin-top: 18px;
      font-size: clamp(3.2rem, 7vw, 6.2rem);
      max-width: 760px;
    }

    .hero-copy {
      max-width: 680px;
    }

    .hero-actions,
    .hero-trust,
    .contact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .hero-trust {
      gap: 12px;
      margin-top: 22px;
    }

    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 247, 251, 0.84);
      font-size: 0.86rem;
    }

    .trust-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--accent));
      box-shadow: 0 0 14px rgba(143, 240, 200, 0.72);
    }

    .hero-panel {
      padding: 26px;
    }

    .hero-frame {
      display: grid;
      gap: 16px;
    }

    .hero-main-card {
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),
        rgba(14, 16, 22, 0.9);
    }

    .hero-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted-soft);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .hero-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--accent));
      box-shadow: 0 0 14px rgba(116, 179, 255, 0.74);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .hero-card-title {
      margin-top: 18px;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.08;
    }

    .hero-card-copy {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.78;
    }

    .hero-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-card {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .mini-card strong {
      display: block;
      font-size: 0.88rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .mini-card p {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.72;
      font-size: 0.94rem;
    }

    .stats-grid,
    .services-grid,
    .benefits-grid,
    .pricing-grid {
      display: grid;
      gap: 18px;
    }

    .stats-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .services-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .benefits-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .pricing-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stat-card,
    .card,
    .pricing-card {
      padding: 24px;
      transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
    }

    .stat-card:hover,
    .card:hover,
    .pricing-card:hover {
      transform: translateY(-6px);
      border-color: rgba(116, 179, 255, 0.28);
      box-shadow: 0 26px 60px rgba(0, 0, 0, 0.3);
    }

    .stat-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(11, 13, 19, 0.88);
    }

    .stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stat-label {
      color: var(--muted-soft);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      line-height: 1.6;
    }

    .market-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(245, 247, 251, 0.82);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .market-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--accent));
      box-shadow: 0 0 14px rgba(143, 240, 200, 0.74);
    }

    .stat-price {
      margin-top: 16px;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(2.2rem, 4.8vw, 3.3rem);
      line-height: 1;
    }

    .stat-note {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.75;
    }

    .card-icon {
      width: 46px;
      height: 46px;
      display: inline-grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(116, 179, 255, 0.12);
      color: #dcedff;
      font-size: 0.86rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card h3,
    .pricing-card h3,
    .hosting-card h3 {
      margin-top: 18px;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.34rem;
      line-height: 1.15;
    }

    .card p,
    .hosting-card p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.78;
    }

    .about-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .about-card {
      padding: 26px;
    }

    .about-card h3 {
      margin-top: 0;
    }

    .hosting-card {
      padding: 26px;
    }

    .hosting-points,
    .plan-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      list-style: none;
    }

    .hosting-points li,
    .plan-list li {
      display: flex;
      gap: 10px;
      color: rgba(245, 247, 251, 0.82);
      line-height: 1.72;
    }

    .hosting-points li::before,
    .plan-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      margin-top: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: linear-gradient(135deg, var(--success), var(--accent));
      box-shadow: 0 0 14px rgba(143, 240, 200, 0.54);
    }

    .pricing-card.featured {
      border-color: rgba(116, 179, 255, 0.24);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, rgba(116, 179, 255, 0.08), rgba(155, 214, 255, 0.08)),
        var(--panel);
    }

    .plan-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;

      align-items: center;
      justify-content: space-between;

      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      cursor: pointer;

      display: grid;
      gap: 16px;
      padding: 18px 20px 20px;
      max-height: 70vh;
      overflow: auto;
    }

    .chat-thread,

      display: grid;
      gap: 12px;
    }

    .message {
      max-width: 92%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.68;
      font-size: 0.92rem;

    .message.user {

      background: rgba(116, 179, 255, 0.16);
    }

    .quick-reply {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 247, 251, 0.9);
      text-align: left;
      cursor: pointer;
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 720ms ease, transform 720ms ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(18px, -14px, 0) scale(1.04); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }

    const $ = (selector, parent = document) => parent.querySelector(selector);
    const $$ = (selector, parent = document) => [...parent.querySelectorAll(selector)];
    const get = (obj, path) => path.split(".").reduce((acc, key) => acc && acc[key] !== undefined ? acc[key] : "", obj);

    let currentLang = "en";

    function detectLanguage() {
      const saved = localStorage.getItem("elaine_lang");
      if (saved && content[saved]) return saved;
      return (navigator.language || "").toLowerCase().startsWith("lt") ? "lt" : "en";
    }

    function setMeta(data) {
      document.documentElement.lang = currentLang;
      document.title = data.meta.title;
      $('meta[name="description"]').setAttribute("content", data.meta.description);
      $('meta[property="og:title"]').setAttribute("content", data.meta.title);
      $('meta[property="og:description"]').setAttribute("content", data.meta.description);
      $('meta[name="twitter:title"]').setAttribute("content", data.meta.title);
      $('meta[name="twitter:description"]').setAttribute("content", data.meta.description);
    }

    function renderTexts(data) {
      $$("[data-i18n]").forEach((node) => {
        const value = get(data, node.dataset.i18n);
        if (value) node.textContent = value;
      });
    }

    function renderLanguageMenu() {
      $("#langCurrent").textContent = content[currentLang].langLabel;
      $("#langMenu").innerHTML = Object.entries(content).map(([key, value]) => `
        <button class="lang-option ${key === currentLang ? "active" : ""}" type="button" role="menuitemradio" aria-checked="${key === currentLang}" data-lang="${key}">
          ${value.langLabel} ${value.menuLabel}
        </button>
      `).join("");
    }

    function renderHero(data) {
      $("#heroTrust").innerHTML = data.hero.trust.map((item) => `<span class="trust-pill">${item}</span>`).join("");
      $("#heroMiniCards").innerHTML = data.hero.miniCards.map((item) => `
        <article class="mini-card">
          <strong>${item.title}</strong>
          <p>${item.copy}</p>
        </article>
      `).join("");
    }

    function renderStats(data) {
      $("#statsGrid").innerHTML = data.stats.map((item) => `
        <article class="stat-card reveal">
          <div class="stat-head">
            <div class="stat-label">${item.label}</div>
            <div class="market-badge">${item.badge}</div>
          </div>
          <div class="stat-price">${item.price}</div>
          <p class="stat-note">${item.note}</p>
        </article>
      `).join("");
    }

    function renderSimpleCards(containerId, items) {
      $(containerId).innerHTML = items.map((item) => `
        <article class="card reveal">
          <div class="card-icon">${item.icon}</div>
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
        </article>
      `).join("");
    }

    function renderAbout(data) {
      $("#aboutGrid").innerHTML = data.about.cards.map((item) => `
        <article class="card about-card reveal">
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
        </article>
      `).join("");
    }

    function renderHosting(data) {
      $("#hostingGrid").innerHTML = data.hosting.cards.map((item) => `
        <article class="card hosting-card reveal">
          <div class="card-icon">${item.icon}</div>
          <h3>${item.title}</h3>
          <p>${item.copy}</p>
          <ul class="hosting-points">${item.points.map((point) => `<li>${point}</li>`).join("")}</ul>
        </article>
      `).join("");
    }

    function renderPricing(data) {
      $("#pricingGrid").innerHTML = data.pricing.cards.map((card) => `
        <article class="pricing-card ${card.featured ? "featured" : ""} reveal">
          <span class="plan-tag">${card.tag}</span>
          <h3 class="pricing-title">${card.title}</h3>
          <p class="pricing-copy">${card.copy}</p>
          ${card.blocks.map((block) => `
            <div class="plan-block">
              <div class="plan-head">
                <div>
                  <div class="plan-name">${block.name}</div>
                  <div class="plan-price">${block.price}</div>
                </div>
              </div>
              <ul class="plan-list">${block.points.map((point) => `<li>${point}</li>`).join("")}</ul>
            </div>
          `).join("")}
          <p class="plan-note">${card.note}</p>
        </article>
      `).join("");
    }

    function renderComparison(data) {
      $("#comparisonHead").innerHTML = data.comparison.head.map((item) => `<th scope="col">${item}</th>`).join("");
      $("#comparisonBody").innerHTML = data.comparison.rows.map((row) => `
        <tr>
          <td>${row[0]}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>
        </tr>
      `).join("");
    }

    function renderContact(data) {
      $("#contactPills").innerHTML = data.contactPills.map((item) => `
        <a class="contact-pill" href="${item.href}" ${item.external ? 'target="_blank" rel="noopener"' : ""}>${item.label}</a>
      `).join("");
      $("#contactCards").innerHTML = data.contactCards.map((item) => `
        <article class="card contact-card reveal">
          <small>${item.label}</small>
          <strong>${item.value}</strong>
          <p>${item.copy}</p>
        </article>
      `).join("");
    }

    function renderChat(data) {
      $("#chatThread").innerHTML = `<div class="message bot">${data.chat.hello}</div>`;
      $("#chatReplies").innerHTML = data.chat.replies.map((item, index) => `
        <button class="quick-reply" type="button" data-chat-index="${index}">${item.label}</button>
      `).join("");
    }

    function applyLanguage(lang) {
      currentLang = content[lang] ? lang : "en";
      const data = content[currentLang];
      localStorage.setItem("elaine_lang", currentLang);
      setMeta(data);
      renderTexts(data);
      renderLanguageMenu();
      renderHero(data);
      renderStats(data);
      renderSimpleCards("#servicesGrid", data.services.cards);
      renderAbout(data);
      renderSimpleCards("#benefitsGrid", data.benefits.cards);
      renderHosting(data);
      renderPricing(data);
      renderComparison(data);
      renderContact(data);
      renderChat(data);
      bindChatReplies(data);
      revealElements();
    }

    function bindChatReplies(data) {
      $$(".quick-reply").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.chatIndex);
          const item = data.chat.replies[index];
          $("#chatThread").insertAdjacentHTML(
            "beforeend",
            `<div class="message user">${item.label}</div><div class="message bot">${item.answer}</div>`
          );
        });
      });
    }

    function revealElements() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("show");
        });
      }, { threshold: 0.14 });

      $$(".reveal").forEach((node) => observer.observe(node));
    }

    function closeLangMenu() {
      $("#langWrap").classList.remove("open");
      $("#langTrigger").setAttribute("aria-expanded", "false");
    }

    function openLangMenu() {
      $("#langWrap").classList.add("open");
      $("#langTrigger").setAttribute("aria-expanded", "true");
    }

    function initLanguageMenu() {
      $("#langTrigger").addEventListener("click", () => {
        if ($("#langWrap").classList.contains("open")) {
          closeLangMenu();
        } else {
          openLangMenu();
        }
      });

      $("#langTrigger").addEventListener("keydown", (event) => {
        if (event.key === "ArrowDown" || event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openLangMenu();
          const first = $(".lang-option", $("#langMenu"));
          if (first) first.focus();
        }
      });

      document.addEventListener("click", (event) => {
        if (!$("#langWrap").contains(event.target)) closeLangMenu();
        const option = event.target.closest("[data-lang]");
        if (option) {
          applyLanguage(option.dataset.lang);
          closeLangMenu();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeLangMenu();
          closeChat();
          closeMobileMenu();
        }
      });
    }

    function openMobileMenu() {
      $("#mobileMenu").classList.add("open");
      $("#menuToggle").classList.add("active");
      $("#menuToggle").setAttribute("aria-expanded", "true");
      document.body.classList.add("menu-open");
    }

    function closeMobileMenu() {
      $("#mobileMenu").classList.remove("open");
      $("#menuToggle").classList.remove("active");
      $("#menuToggle").setAttribute("aria-expanded", "false");
      document.body.classList.remove("menu-open");
    }

    function initMobileMenu() {
      $("#menuToggle").addEventListener("click", () => {
        if ($("#mobileMenu").classList.contains("open")) {
          closeMobileMenu();
        } else {
          openMobileMenu();
        }
      });

      $$("#mobileMenu a").forEach((link) => {
        link.addEventListener("click", closeMobileMenu);
      });
    }

    function openChat() {
      $("#chatWidget").classList.add("open");
      $("#chatToggle").setAttribute("aria-expanded", "true");
      document.body.classList.add("chat-open");
    }

    function closeChat() {
      $("#chatWidget").classList.remove("open");
      $("#chatToggle").setAttribute("aria-expanded", "false");
      document.body.classList.remove("chat-open");
    }

    function initChat() {
      $("#chatToggle").addEventListener("click", () => {
        if ($("#chatWidget").classList.contains("open")) {
          closeChat();
        } else {
          openChat();
        }
      });

      $("#chatClose").addEventListener("click", closeChat);
    }

    function initHeaderEffects() {
      window.addEventListener("scroll", () => {
        const top = window.scrollY;
        const height = document.documentElement.scrollHeight - window.innerHeight;
        $("#progress").style.width = `${height > 0 ? (top / height) * 100 : 0}%`;
        $("#header").classList.toggle("scrolled", top > 14);
      }, { passive: true });
    }

    function initVideo() {
      const video = $("#bgVideo");
      const setRate = () => {
        video.playbackRate = 0.42;
      };
      setRate();
      video.addEventListener("loadedmetadata", setRate);
      video.addEventListener("canplay", setRate);
      video.play().catch(() => {});
    }

    function init() {
      currentLang = detectLanguage();
      applyLanguage(currentLang);
      initLanguageMenu();
      initMobileMenu();
      initChat();
      initHeaderEffects();
      initVideo();
    }

    init();
  </script>
