<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elaine Ares | Modern Websites And SEO Support</title>
  <meta name="description" content="Website development, landing pages, redesign and SEO support for Lithuanian and international businesses.">
  <meta name="keywords" content="website development, seo, web design, landing pages, business website, responsive website, freelancer, svetainiu kurimas, seo paslaugos">
  <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1">
  <meta name="theme-color" content="#09030f">
  <link rel="canonical" href="https://elaineares.com/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Elaine Ares | Modern Websites And SEO Support">
  <meta property="og:description" content="Modern websites and clean SEO support designed to help businesses earn trust and more enquiries.">
  <meta property="og:url" content="https://elaineares.com/">
  <meta property="og:image" content="./images/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Elaine Ares | Modern Websites And SEO Support">
  <meta name="twitter:description" content="Website development and SEO support with a clean visual direction and a conversion-focused structure.">
  <meta name="twitter:image" content="./images/logo.png">
  <link rel="icon" type="image/png" href="./images/logo.png">
  <style>
    :root {
      --bg: #07020d;
      --panel: rgba(18, 9, 28, 0.64);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f8f1ff;
      --muted: rgba(248, 241, 255, 0.72);
      --violet: #a36bff;
      --rose: #f3b4ff;
      --cyan: #aaf6ff;
      --green: #a0ffd7;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.34);
      --radius: 24px;
      --container: min(1200px, calc(100% - 32px));
      --topbar-h: 42px;
      --nav-h: 84px;
      --ease: 260ms cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background: var(--bg);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      isolation: isolate;
    }

    body.menu-open,
    body.chat-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .bg-video,
    .overlay,
    .overlay-soft,
    .lights,
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.5) saturate(0.9) contrast(1.04);
      transform: scale(1.06);
    }

    .overlay {
      z-index: 1;
      background:
        radial-gradient(circle at 14% 18%, rgba(243, 180, 255, 0.18), transparent 26%),
        radial-gradient(circle at 78% 20%, rgba(163, 107, 255, 0.22), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(90, 32, 150, 0.24), transparent 34%),
        linear-gradient(180deg, rgba(22, 8, 34, 0.14) 0%, rgba(12, 4, 20, 0.52) 52%, rgba(6, 2, 10, 0.88) 100%);
    }

    .overlay-soft {
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(7, 2, 12, 0.08) 0%, rgba(7, 2, 12, 0.12) 18%, rgba(7, 2, 12, 0.44) 64%, rgba(7, 2, 12, 0.82) 100%),
        linear-gradient(90deg, rgba(7, 2, 12, 0.68) 0%, rgba(7, 2, 12, 0.14) 26%, rgba(7, 2, 12, 0.14) 74%, rgba(7, 2, 12, 0.7) 100%);
    }

    .lights {
      z-index: 3;
      inset: -10%;
      filter: blur(60px);
      background:
        radial-gradient(circle at 18% 30%, rgba(243, 180, 255, 0.18), transparent 20%),
        radial-gradient(circle at 84% 22%, rgba(163, 107, 255, 0.18), transparent 18%),
        radial-gradient(circle at 48% 88%, rgba(85, 40, 150, 0.16), transparent 22%);
      animation: drift 16s ease-in-out infinite;
    }

    .grain {
      z-index: 4;
      opacity: 0.05;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 4px 4px;
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1300;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--rose), var(--violet), var(--cyan));
      box-shadow: 0 0 22px rgba(163, 107, 255, 0.7);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1200;
      width: 100%;
      min-height: var(--topbar-h);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(10, 4, 16, 0.62);
      backdrop-filter: blur(14px);
    }

    .topbar-inner,
    .nav-inner,
    .section-inner,
    .footer-inner {
      width: var(--container);
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
    }

    .announcement-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .badge,
    .eyebrow,
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f8dcff;
    }

    .badge::before,
    .eyebrow::before,
    .chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      box-shadow: 0 0 16px rgba(163, 107, 255, 0.9);
    }

    .announcement-text {
      min-width: 0;
      color: rgba(248, 241, 255, 0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.92rem;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .quick-actions a,
    .ghost-btn,
    .lang-trigger,
    .lang-menu button,
    .nav-cta,
    .hero-btn,
    .contact-btn,
    .chat-question,
    .chat-toggle,
    .menu-toggle {
      transition:
        transform var(--ease),
        background var(--ease),
        border-color var(--ease),
        box-shadow var(--ease),
        opacity var(--ease);
    }

    .quick-actions a,
    .ghost-btn,
    .contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .quick-actions a:hover,
    .ghost-btn:hover,
    .contact-btn:hover,
    .lang-trigger:hover,
    .lang-menu button:hover,
    .nav-cta:hover,
    .hero-btn:hover,
    .chat-question:hover,
    .chat-toggle:hover,
    .menu-toggle:hover {
      transform: translateY(-2px);
    }

    .nav {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      z-index: 1190;
      width: 100%;
    }

    .nav-shell {
      width: var(--container);
      margin: 10px auto 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 26px;
      background: rgba(15, 7, 24, 0.54);
      backdrop-filter: blur(16px);
      transition: background var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .nav.scrolled .nav-shell {
      background: rgba(11, 4, 18, 0.78);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.28);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: var(--nav-h);
      padding: 0 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo-frame {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .brand-title {
      display: block;
      font-family: "Bodoni MT", "Times New Roman", serif;
      font-size: 1.18rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand-sub {
      display: block;
      margin-top: 2px;
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(248, 241, 255, 0.58);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-left: auto;
    }

    .nav-link {
      position: relative;
      font-size: 0.94rem;
      color: rgba(248, 241, 255, 0.84);
    }

    .nav-link::after,
    .nav-cta::after,
    .hero-btn.primary::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 1px;
      transform: scaleX(0);
      transform-origin: left;
      background: linear-gradient(90deg, var(--rose), var(--violet), transparent);
      transition: transform var(--ease);
    }

    .nav-link:hover::after,
    .nav-cta:hover::after,
    .hero-btn.primary:hover::after {
      transform: scaleX(1);
    }

    .nav-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 18px;
    }

    .lang-select {
      position: relative;
    }

    .lang-trigger {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 90px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
    }

    .lang-trigger::after {
      content: "▾";
      font-size: 0.84rem;
      color: rgba(248, 241, 255, 0.72);
    }

    .lang-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 150px;
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: rgba(12, 4, 20, 0.94);
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity var(--ease), visibility var(--ease), transform var(--ease);
    }

    .lang-select.open .lang-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-menu button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(248, 241, 255, 0.84);
      text-align: left;
      cursor: pointer;
    }

    .lang-menu button.active {
      border-color: rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, rgba(243, 180, 255, 0.16), rgba(163, 107, 255, 0.18));
      color: #fff;
    }

    .nav-cta,
    .hero-btn.primary,
    .chat-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08)),
        linear-gradient(135deg, rgba(243, 180, 255, 0.66), rgba(163, 107, 255, 0.86));
      box-shadow: 0 18px 42px rgba(116, 62, 182, 0.28);
      cursor: pointer;
    }

    .menu-toggle {
      display: none;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      cursor: pointer;
    }

    .menu-toggle span,
    .menu-toggle::before,
    .menu-toggle::after {
      content: "";
      display: block;
      width: 18px;
      height: 2px;
      margin: 0 auto;
      border-radius: 999px;
      background: #fff;
      transition: transform var(--ease), opacity var(--ease);
    }

    .menu-toggle span {
      margin: 6px auto;
    }

    .menu-toggle.active::before {
      transform: translateY(8px) rotate(45deg);
    }

    .menu-toggle.active span {
      opacity: 0;
    }

    .menu-toggle.active::after {
      transform: translateY(-8px) rotate(-45deg);
    }

    .mobile-menu {
      position: fixed;
      top: calc(var(--topbar-h) + 96px);
      left: 16px;
      right: 16px;
      z-index: 1180;
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      background: rgba(12, 4, 20, 0.94);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity var(--ease), visibility var(--ease), transform var(--ease);
    }

    .mobile-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    main {
      position: relative;
      z-index: 5;
      padding-top: calc(var(--topbar-h) + var(--nav-h) + 52px);
    }

    .section {
      position: relative;
      padding: 96px 0;
    }

    .section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(1120px, calc(100% - 32px));
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
      opacity: 0.54;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 30px;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #f8dcff;
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .section-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      box-shadow: 0 0 16px rgba(163, 107, 255, 0.84);
    }

    h1,
    h2,
    h3 {
      font-family: "Bodoni MT", "Times New Roman", serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 0.98;
    }

    .section-title {
      margin-top: 16px;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
    }

    .section-copy,
    .plan-copy,
    .portfolio-copy,
    .faq-answer,
    .contact-copy {
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.82;
      font-size: 1.02rem;
      max-width: 760px;
    }

    .glass,
    .card,
    .plan-card,
    .portfolio-card,
    .contact-wrap,
    .chat-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)), var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .glass::before,
    .card::before,
    .plan-card::before,
    .portfolio-card::before,
    .contact-wrap::before,
    .chat-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 36%);
      opacity: 0.36;
      pointer-events: none;
    }

    .hero {
      padding-top: 42px;
      padding-bottom: 88px;
    }

    .hero-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(340px, 0.98fr);
      gap: 28px;
      align-items: center;
    }

    .hero-title {
      margin-top: 18px;
      font-size: clamp(3.4rem, 8vw, 6.8rem);
      text-shadow: 0 0 30px rgba(163, 107, 255, 0.16);
    }

    .hero-title .shine {
      color: transparent;
      background: linear-gradient(90deg, #fff 0%, #f6dcff 34%, #c691ff 72%, #fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .hero-copy {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.85;
      font-size: 1.04rem;
      max-width: 680px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .hero-btn.secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .hero-trust {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .hero-panel {
      padding: 24px;
    }

    .price-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .price-card {
      position: relative;
      min-height: 138px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)), rgba(6, 2, 10, 0.84);
      overflow: hidden;
    }

    .price-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(180deg, transparent 0 26px, rgba(255, 255, 255, 0.03) 26px 27px),
        repeating-linear-gradient(90deg, transparent 0 48px, rgba(255, 255, 255, 0.03) 48px 49px);
      opacity: 0.38;
      pointer-events: none;
    }

    .price-card.live::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(170, 246, 255, 0.18), transparent 68%);
      filter: blur(4px);
    }

    .price-label {
      position: relative;
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(248, 241, 255, 0.66);
      line-height: 1.6;
    }

    .price-value {
      position: relative;
      margin-top: 14px;
      font-family: "Bodoni MT", "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
    }

    .price-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .price-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(248, 241, 255, 0.84);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .price-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      box-shadow: 0 0 14px rgba(170, 246, 255, 0.75);
    }

    .live-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #dffcff;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .price-note {
      position: relative;
      margin-top: 12px;
      color: rgba(248, 241, 255, 0.62);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      box-shadow: 0 0 18px rgba(160, 255, 215, 0.9);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .hero-preview {
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 3, 14, 0.86);
    }

    .hero-preview-top {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .hero-preview-top span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
    }

    .hero-preview-body {
      padding: 22px;
    }

    .mini-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .mini-stat {

    const langNames = { en: "EN", lt: "LT", ru: "RU" };
    let currentLang = "en";
    let announcementIndex = 0;
    let announcementTimer = null;

    const $ = (selector, parent = document) => parent.querySelector(selector);
    const $$ = (selector, parent = document) => [...parent.querySelectorAll(selector)];
    const getValue = (obj, path) => path.split(".").reduce((acc, key) => acc && acc[key] !== undefined ? acc[key] : "", obj);

    function detectLanguage() {
      const saved = localStorage.getItem("elaine_ares_lang");
      if (saved && content[saved]) return saved;
      return (navigator.language || "").toLowerCase().startsWith("lt") ? "lt" : "en";
    }

    function setMeta(data) {
      document.documentElement.lang = currentLang;
      document.title = data.meta.title;
      $('meta[name="description"]').setAttribute("content", data.meta.description);
      $('meta[property="og:title"]').setAttribute("content", data.meta.title);
      $('meta[property="og:description"]').setAttribute("content", data.meta.description);
      $('meta[name="twitter:title"]').setAttribute("content", data.meta.title);
      $('meta[name="twitter:description"]').setAttribute("content", data.meta.description);
    }

    function renderLanguageMenu() {
      $("#currentLanguage").textContent = langNames[currentLang];
      $("#langMenu").innerHTML = Object.keys(langNames).map((lang) => `
        <button type="button" class="${lang === currentLang ? "active" : ""}" data-lang="${lang}">
          ${langNames[lang]} ${content[lang].codeLong}
        </button>
      `).join("");
    }

    function renderStaticText(data) {
      $$("[data-i18n]").forEach((node) => {
        const value = getValue(data, node.dataset.i18n);
        if (value) node.textContent = value;
      });
    }

    function renderHero(data) {
      $("#heroTrust").innerHTML = data.hero.trust.map((item) => `<span class="chip">${item}</span>`).join("");
      $("#heroStats").innerHTML = data.hero.stats.map((item) => `
        <div class="mini-stat">
          <strong>${item[0]}</strong>
          <span>${item[1]}</span>
        </div>
      `).join("");
      $("#priceRow").innerHTML = data.hero.prices.map((item, index) => `
        <div class="price-card ${index === 1 ? "live" : ""}">
          <div class="price-head">
            <div class="price-label">${item.label}</div>
            <div class="price-badge">${item.badge}</div>
          </div>
          <div class="price-value">${item.value}</div>
          <div class="price-note">${item.note}</div>
          ${item.live ? `<div class="live-badge">${item.live}</div>` : ""}
        </div>
      `).join("");
    }

    function renderCards(containerId, items) {
      $(containerId).innerHTML = items.map((card) => `
        <article class="card reveal">
          <span class="card-icon">${card.icon}</span>
          <h3>${card.title}</h3>
          <p>${card.copy}</p>
        </article>
      `).join("");
    }

    function renderPlans(data) {
      $("#plansGrid").innerHTML = data.pricing.plans.map((plan) => `
        <article class="plan-card ${plan.featured ? "featured" : ""} reveal">
          <span class="plan-band">${plan.band}</span>
          <h3 class="plan-title">${plan.title}</h3>
          <p class="plan-copy">${plan.intro}</p>
          <div class="plan-stack">
            <div class="plan-block">
              <div class="plan-label">${plan.seoLabel}</div>
              <div class="plan-price">${plan.seoPrice}</div>
              <ul class="plan-list">${plan.seoPoints.map((point) => `<li>${point}</li>`).join("")}</ul>
            </div>
            <div class="plan-block">
              <div class="plan-label">${plan.hostLabel}</div>
              <div class="plan-price">${plan.hostPrice}</div>
              <ul class="plan-list">${plan.hostPoints.map((point) => `<li>${point}</li>`).join("")}</ul>
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderPortfolio(data) {
      $("#portfolioGrid").innerHTML = data.portfolio.items.map((item) => `
        <a class="portfolio-card reveal" href="${item.href}" target="_blank" rel="noopener">
          <div class="portfolio-preview" style="--image:url('${item.image}')">
            <div class="mock-browser">
              <div class="mock-top"><i></i><i></i><i></i></div>
              <div class="mock-body"><div class="domain">${item.domain}</div></div>
            </div>
          </div>
          <div class="portfolio-meta">
            <div class="portfolio-category">${item.category}</div>
            <p class="portfolio-goal">${item.goal}</p>
            <span class="portfolio-open">${data.portfolio.open}</span>
          </div>
        </a>
      `).join("");
    }

    function renderFaq(data) {
      $("#faqGrid").innerHTML = data.faq.items.map((item, index) => `
        <div class="faq-item ${index === 0 ? "open" : ""}">
          <button class="faq-question" type="button">
            <span>${item.q}</span>
            <strong>+</strong>
          </button>
          <div class="faq-answer-wrap" style="${index === 0 ? "max-height:220px;" : ""}">
            <p class="faq-answer">${item.a}</p>
          </div>
        </div>
      `).join("");

      $$(".faq-item").forEach((item) => {
        $(".faq-question", item).addEventListener("click", () => {
          const open = item.classList.contains("open");
          $$(".faq-item").forEach((card) => {
            card.classList.remove("open");
            $(".faq-answer-wrap", card).style.maxHeight = "0px";
          });
          if (!open) {
            item.classList.add("open");
            const wrap = $(".faq-answer-wrap", item);
            wrap.style.maxHeight = `${wrap.scrollHeight + 12}px`;
          }
        });
      });
    }

    function renderContact(data) {
      $("#contactCards").innerHTML = data.contactCards.map((card) => `
        <article class="card reveal">
          <div class="contact-label">${card.label}</div>
          <div class="contact-value">${card.value}</div>
          <p>${card.copy}</p>
        </article>
      `).join("");
    }

    function renderChat(data) {
      $("#chatThread").innerHTML = `<div class="message bot">${data.chat.hello}</div>`;
      $("#chatQuestions").innerHTML = data.chat.questions.map((question, index) => `
        <button class="chat-question" type="button" data-question="${index}">${question}</button>
      `).join("");

      $$(".chat-question").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.question);
          $("#chatThread").insertAdjacentHTML(
            "beforeend",
            `<div class="message user">${data.chat.questions[index]}</div><div class="message bot">${data.chat.answers[index]}</div>`
          );
        });
      });
    }

    function runAnnouncements(data) {
      clearInterval(announcementTimer);
      announcementIndex = 0;
      $("#announcementText").textContent = data.announcements[0];
      announcementTimer = setInterval(() => {
        announcementIndex = (announcementIndex + 1) % data.announcements.length;
        $("#announcementText").textContent = data.announcements[announcementIndex];
      }, 3200);
    }

    function revealObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("show");
        });
      }, { threshold: 0.15 });

      $$(".reveal").forEach((node) => observer.observe(node));
    }

    function applyLanguage(lang) {
      currentLang = content[lang] ? lang : "en";
      localStorage.setItem("elaine_ares_lang", currentLang);
      const data = content[currentLang];

      setMeta(data);
      renderLanguageMenu();
      renderStaticText(data);
      renderHero(data);
      renderCards("#aboutCards", data.about.cards);
      renderCards("#servicesGrid", data.services.items);
      renderPlans(data);
      renderCards("#seoCards", data.seo.cards);
      renderPortfolio(data);
      renderFaq(data);
      renderContact(data);
      renderChat(data);
      runAnnouncements(data);
      revealObserver();
    }

    function initDropdown() {
      $("#langTrigger").addEventListener("click", () => {
        $("#langSelect").classList.toggle("open");
      });

      document.addEventListener("click", (event) => {
        if (!$("#langSelect").contains(event.target)) {
          $("#langSelect").classList.remove("open");
        }

        const button = event.target.closest("[data-lang]");
        if (button) {
          applyLanguage(button.dataset.lang);
          $("#langSelect").classList.remove("open");
        }
      });
    }

    function initMobileMenu() {
      $("#menuToggle").addEventListener("click", () => {
        const active = !$("#mobileMenu").classList.contains("active");
        $("#mobileMenu").classList.toggle("active", active);
        $("#menuToggle").classList.toggle("active", active);
        document.body.classList.toggle("menu-open", active);
      });

      $$("#mobileMenu a").forEach((link) => {
        link.addEventListener("click", () => {
          $("#mobileMenu").classList.remove("active");
          $("#menuToggle").classList.remove("active");
          document.body.classList.remove("menu-open");
        });
      });
    }

    function initChat() {
      $("#chatToggle").addEventListener("click", () => {
        const open = !$("#chatPanel").classList.contains("open");
        $("#chatPanel").classList.toggle("open", open);
        document.body.classList.toggle("chat-open", open);
      });

      $("#chatClose").addEventListener("click", () => {
        $("#chatPanel").classList.remove("open");
        document.body.classList.remove("chat-open");
      });
    }

    function initScrollEffects() {
      window.addEventListener("scroll", () => {
        const top = window.scrollY;
        const height = document.documentElement.scrollHeight - window.innerHeight;
        $("#progress").style.width = `${height > 0 ? (top / height) * 100 : 0}%`;
        $("#nav").classList.toggle("scrolled", top > 18);
      }, { passive: true });
    }

    function initVideo() {
      const video = $("#bgVideo");
      const setRate = () => { video.playbackRate = 0.44; };
      setRate();
      video.addEventListener("loadedmetadata", setRate);
      video.addEventListener("canplay", setRate);
      video.play().catch(() => {});
    }

    function init() {
      currentLang = detectLanguage();
      applyLanguage(currentLang);
      initDropdown();
      initMobileMenu();
      initChat();
      initScrollEffects();
      initVideo();
    }

    init();
  </script>
</body>
